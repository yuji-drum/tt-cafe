<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>t.t cafe - Staff</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#eae7de;--cream-dark:#d8d4c7;--green:#2a6b35;--green-dark:#1d4d26;--text:#2a3020;--text-mid:#4a5a40;--text-muted:#7a8a70;--white:#f5f3ee;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Jost','Hiragino Sans',sans-serif;background:#f0ede6;color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%;}
.topbar{background:var(--green-dark);padding:.7rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-img{width:34px;height:34px;object-fit:contain;border-radius:50%;}
.logo-text{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;color:var(--cream);}
.status-dot{width:8px;height:8px;border-radius:50%;background:#aaa;display:inline-block;margin-right:4px;}
.status-dot.online{background:#4caf50;}
.status-dot.offline{background:#f44;}
.status-txt{font-size:10px;color:rgba(255,255,255,.6);font-family:'Jost',sans-serif;}
.top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.add-btn{background:var(--cream);border:none;color:var(--green-dark);padding:.4rem 1rem;border-radius:2px;font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:.1em;cursor:pointer;}
.charter-btn{background:#c8903a;border:none;color:#fff;padding:.4rem .9rem;border-radius:2px;font-family:'Jost',sans-serif;font-size:11px;cursor:pointer;}
.lock-btn{background:none;border:1px solid rgba(255,255,255,.3);color:var(--cream);padding:.4rem .9rem;border-radius:2px;font-size:11px;cursor:pointer;font-family:'Jost',sans-serif;}
.nav-bar{background:var(--green-dark);border-top:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:space-between;padding:.4rem 1.25rem;}
.view-tabs{display:flex;gap:4px;}
.vtab{background:none;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.6);padding:.3rem .9rem;border-radius:2px;font-size:11px;cursor:pointer;text-transform:uppercase;font-family:'Jost',sans-serif;}
.vtab.on{background:rgba(255,255,255,.15);color:var(--cream);border-color:rgba(255,255,255,.4);}
.date-nav{display:flex;align-items:center;gap:8px;}
.dnav{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:var(--cream);padding:.25rem .6rem;border-radius:2px;cursor:pointer;font-size:14px;line-height:1;}
.date-lbl{font-size:12px;color:var(--cream);min-width:140px;text-align:center;font-family:'Jost',sans-serif;}
.today-btn{font-size:10px;color:rgba(255,255,255,.5);cursor:pointer;border:1px solid rgba(255,255,255,.2);padding:.2rem .55rem;border-radius:2px;background:none;font-family:'Jost',sans-serif;}
.body{padding:1rem;}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.sc{background:var(--white);border:1px solid var(--cream-dark);border-radius:4px;padding:.7rem 1rem;}
.sc-name{font-size:11px;color:var(--text-muted);margin-bottom:5px;font-family:'Jost',sans-serif;}
.sc-bar-wrap{background:var(--cream-dark);border-radius:2px;height:5px;overflow:hidden;margin-bottom:4px;}
.sc-bar{height:5px;border-radius:2px;}
.sc-nums{font-family:'Cormorant Garamond',serif;font-size:15px;display:flex;align-items:baseline;gap:3px;}
.sc-u{color:var(--green-dark);font-weight:500;}
.sc-sep,.sc-tot{color:var(--text-muted);font-size:12px;}
.legend{display:flex;gap:14px;margin-bottom:.75rem;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted);font-family:'Jost',sans-serif;}
.leg-pip{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.view-panel{display:none;}
.view-panel.active{display:block;}
.grp{margin-bottom:1.25rem;}
.grp-head{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--green-dark);border-bottom:1px solid var(--cream-dark);padding-bottom:.3rem;margin-bottom:.5rem;display:flex;align-items:baseline;gap:8px;}
.grp-cnt{font-size:10px;color:var(--text-muted);font-family:'Jost',sans-serif;}
.card{background:var(--white);border:1px solid var(--cream-dark);border-radius:3px;padding:.7rem 1rem;margin-bottom:5px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.c-time{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--green-dark);min-width:90px;}
.c-name{font-size:14px;flex:1;font-family:'Jost',sans-serif;min-width:70px;}
.c-seat{font-size:11px;color:var(--text-muted);min-width:110px;font-family:'Jost',sans-serif;}
.c-pax{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--text-mid);min-width:28px;text-align:right;}
.c-tel{font-size:11px;color:var(--text-muted);font-family:'Jost',sans-serif;}
.edit-btn{background:none;border:1px solid var(--green);color:var(--green);padding:.18rem .5rem;border-radius:2px;cursor:pointer;font-size:10px;margin-left:auto;font-family:'Jost',sans-serif;}
.del-btn{background:none;border:1px solid var(--cream-dark);color:#a05050;padding:.18rem .45rem;border-radius:2px;cursor:pointer;font-size:10px;font-family:'Jost',sans-serif;}
.empty{text-align:center;padding:3rem 1rem;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--text-muted);}
.tl-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tl-table{min-width:1000px;border-collapse:collapse;width:100%;background:var(--white);}
.tl-table th{font-size:10px;color:var(--text-muted);font-weight:400;padding:.35rem .2rem;text-align:center;border-bottom:1px solid var(--cream-dark);}
.tl-lbl{font-size:11px;color:var(--text-mid);padding:.4rem .5rem .4rem 4px;vertical-align:middle;white-space:nowrap;border-bottom:1px solid var(--cream-dark);min-width:60px;font-weight:500;}
.tl-lbl-sub{font-size:9px;color:var(--text-muted);font-weight:400;}
.tl-cell{border-bottom:1px solid var(--cream-dark);border-left:1px solid #e6e2d8;padding:1px;vertical-align:top;height:40px;min-width:42px;position:relative;}
.tl-block{border-radius:2px;padding:2px 4px;margin-bottom:1px;cursor:pointer;}
.tl-bname{font-size:9px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px;}
.tl-bpax{font-size:8px;color:rgba(245,243,238,.85);}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.week-col{background:var(--white);border:1px solid var(--cream-dark);border-radius:4px;overflow:hidden;min-height:180px;}
.week-col-head{padding:.4rem .5rem;border-bottom:1px solid var(--cream-dark);text-align:center;}
.week-col-dayname{font-size:10px;color:var(--text-muted);}
.week-col-num{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--text);line-height:1.1;}
.week-col-num.is-today{color:var(--green);font-weight:500;}
.week-col-body{padding:.3rem .4rem;}
.week-chip{font-size:10px;padding:.2rem .4rem;border-radius:2px;margin-bottom:3px;color:var(--white);line-height:1.3;}
.week-more{font-size:9px;color:var(--text-muted);padding:.1rem .4rem;}
.week-none{font-size:9px;color:var(--cream-dark);padding:.3rem .4rem;}
.month-head-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;}
.month-head-cell{text-align:center;font-size:10px;color:var(--text-muted);padding:.3rem 0;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.month-cell{background:var(--white);border:1px solid var(--cream-dark);border-radius:3px;min-height:80px;padding:.3rem .4rem;cursor:pointer;}
.month-cell.other{background:#f5f2eb;opacity:.55;pointer-events:none;}
.month-cell.is-today .month-cell-num{color:var(--green);font-weight:500;}
.month-cell.selected{border-color:var(--green);background:#f0f5f1;}
.month-cell-num{font-family:'Cormorant Garamond',serif;font-size:15px;margin-bottom:.2rem;}
.month-chip{font-size:9px;padding:.12rem .3rem;border-radius:2px;margin-bottom:2px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.month-more{font-size:8px;color:var(--text-muted);}
.month-detail{margin-top:1rem;background:var(--white);border:1px solid var(--cream-dark);border-radius:4px;padding:1rem;}
.month-detail-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--green-dark);margin-bottom:.75rem;border-bottom:1px solid var(--cream-dark);padding-bottom:.4rem;}
.overlay{position:fixed;inset:0;background:rgba(42,48,32,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem;overflow-y:auto;}
.overlay.off{display:none;}
.modal{background:var(--white);border-radius:3px;padding:1.75rem;width:100%;max-width:380px;margin:auto;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:300;color:var(--green-dark);margin-bottom:1.25rem;}
.mlabel{display:block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--green);margin-bottom:.3rem;font-family:'Jost',sans-serif;}
.mrow2{display:flex;gap:8px;}
.mrow2>div{flex:1;}
.minput,.mselect,.mtextarea{width:100%;border:1px solid var(--cream-dark);background:var(--cream);padding:.6rem .75rem;border-radius:2px;font-size:16px;font-family:'Jost',sans-serif;color:var(--text);margin-bottom:.9rem;-webkit-appearance:none;}
.mtextarea{resize:vertical;min-height:60px;}
.mwarn{font-size:11px;color:#b05050;margin-top:-.5rem;margin-bottom:.75rem;display:none;}
.mrow{display:flex;gap:8px;}
.mcancel{flex:1;background:none;border:1px solid var(--cream-dark);color:var(--text-muted);padding:.65rem;border-radius:2px;cursor:pointer;font-size:12px;}
.mok{flex:2;background:var(--green);border:none;color:var(--white);padding:.65rem;border-radius:2px;cursor:pointer;font-size:12px;letter-spacing:.1em;}
.mok:disabled{opacity:.4;cursor:not-allowed;}
.mok.charter{background:#c8903a;}
</style>
</head>

var TL_ORDER = ["C1","C2","C3","C4","C5","C6","C7","C8","T1","T2","T3","T4","T5"];
var GROUPS = [
  { id:"counter", name:"カウンター席", color:"#4a8fa8", tables:["C1","C2","C3","C4","C5","C6"] },
  { id:"sofa",    name:"ソファ席",     color:"#5a8f5a", tables:["T1","T2","T4","T5","T3"] },
  { id:"terrace", name:"テラス席",     color:"#c88a4a", tables:["C7","C8"] }
];

function tableById(id){ for(var i=0;i<TABLES.length;i++) if(TABLES[i].id===id) return TABLES[i]; return null; }
function groupById(id){ for(var i=0;i<GROUPS.length;i++) if(GROUPS[i].id===id) return GROUPS[i]; return null; }
function groupName(id){ var g=groupById(id); return g?g.name:id; }
function groupColor(id){ var g=groupById(id); return g?g.color:"#aaa"; }

var WEEK_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var HOURS = [];
for (var h = 11; h <= 22; h++) { HOURS.push(h+":00"); if (h < 22) HOURS.push(h+":30"); }
var END_HOURS = [];
for (var h = 11; h <= 23; h++) { END_HOURS.push(h+":00"); if (h < 23) END_HOURS.push(h+":30"); }

var curView = "", curDay = today0(), curWeekStart = weekStart(curDay);
var curMonth = new Date(curDay.getFullYear(), curDay.getMonth(), 1);
var selMonthDay = null, rsvCache = [], cbN = 0, editingId = null;

function today0() { var d = new Date(); d.setHours(0,0,0,0); return d; }
function pad(n) { return ("0"+n).slice(-2); }
function fmtD(d) { return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function addDays(d,n) { var r=new Date(d); r.setDate(r.getDate()+n); return r; }
function weekStart(d) { var s=new Date(d); s.setDate(s.getDate()-s.getDay()); s.setHours(0,0,0,0); return s; }
function isToday(d) { return fmtD(d)===fmtD(new Date()); }
function fmtLabel(d) { var W=["日","月","火","水","木","金","土"]; return (d.getMonth()+1)+"月"+d.getDate()+"日("+W[d.getDay()]+")"; }
function fmtWeekLabel(s) { var e=addDays(s,6); return (s.getMonth()+1)+"/"+s.getDate()+" 〜 "+(e.getMonth()+1)+"/"+e.getDate(); }
function fmtMonthLabel(d) { return d.getFullYear()+"年"+(d.getMonth()+1)+"月"; }
function rsvsByDate(ds) { var out=[]; for(var i=0;i<rsvCache.length;i++) if(rsvCache[i].date===ds) out.push(rsvCache[i]); return out; }

function timeToMin(t) { if(!t) return 0; var p=t.split(":"); return parseInt(p[0])*60+parseInt(p[1]); }
function minToTime(m) { return pad(Math.floor(m/60))+":"+pad(m%60); }
function getEnd(r) { if(r.endtime) return r.endtime; return minToTime(timeToMin(r.time)+120); }
function overlaps(s1,e1,s2,e2) { return s1<e2 && e1>s2; }

// 旧データのseat→group変換
function normalizeGroup(seat) {
  if (seat==="counter") return "counter";
  if (seat==="sofa"||seat==="sofa-s"||seat==="sofa-l") return "sofa";
  if (seat==="terrace") return "terrace";
  if (seat==="charter") return "charter";
  return seat;
}

function isDayLocked(date) {
  for (var i=0;i<rsvCache.length;i++) if(rsvCache[i].date===date && rsvCache[i].type==="lock") return true;
  return false;
}
function isCharterAt(date,start,end) {
  for(var i=0;i<rsvCache.length;i++){
    var r=rsvCache[i];
    if(r.date!==date||r.type!=="charter") continue;
    if(overlaps(start,end,timeToMin(r.time),timeToMin(getEnd(r)))) return true;
  }
  return false;
}
// 指定時間に使用中の卓idセット
function usedTablesAt(date,start,end,excludeId) {
  var used={};
  for(var i=0;i<rsvCache.length;i++){
    var r=rsvCache[i];
    if(r.date!==date) continue;
    if(r.type==="lock") continue;
    if(excludeId && String(r.id)===String(excludeId)) continue;
    if(!overlaps(start,end,timeToMin(r.time),timeToMin(getEnd(r)))) continue;
    if(r.table){
      var tbls=r.table.split(",");
      for(var k=0;k<tbls.length;k++) used[tbls[k].trim()]=true;
    }
  }
  return used;
}
// 自動割当
function assignTables(date,start,end,group,pax,excludeId) {
  var used=usedTablesAt(date,start,end,excludeId);
  var g=groupById(group);
  if(!g) return null;
  var ordered=[];
  for(var i=0;i<g.tables.length;i++){ if(!used[g.tables[i]]) ordered.push(tableById(g.tables[i])); }
  // 1卓で収まる最小卓
  var fit=null;
  for(var i=0;i<ordered.length;i++){ if(ordered[i].cap>=pax){ fit=ordered[i]; break; } }
  if(fit) return [fit.id];
  // 複数卓
  var assigned=[]; var remaining=pax;
  for(var i=0;i<ordered.length;i++){ assigned.push(ordered[i].id); remaining-=ordered[i].cap; if(remaining<=0) return assigned; }
  return null;
}
function tryBook(date,time,endtime,group,pax,excludeId) {
  var start=timeToMin(time), end=timeToMin(endtime);
  if(isDayLocked(date)) return {ok:false,reason:"本日はロックされています"};
  if(isCharterAt(date,start,end)) return {ok:false,reason:"貸切時間帯です"};
  var tables=assignTables(date,start,end,group,pax,excludeId);
  if(!tables) return {ok:false,reason:groupName(group)+"満席"};
  return {ok:true,table:tables.join(",")};
}

function navPrev(){if(curView==="day"||curView==="tl")curDay=addDays(curDay,-1);else if(curView==="week")curWeekStart=addDays(curWeekStart,-7);else curMonth=new Date(curMonth.getFullYear(),curMonth.getMonth()-1,1);updateLbl();render();}
function navNext(){if(curView==="day"||curView==="tl")curDay=addDays(curDay,1);else if(curView==="week")curWeekStart=addDays(curWeekStart,7);else curMonth=new Date(curMonth.getFullYear(),curMonth.getMonth()+1,1);updateLbl();render();}
function goToday(){curDay=today0();curWeekStart=weekStart(curDay);curMonth=new Date(curDay.getFullYear(),curDay.getMonth(),1);updateLbl();render();}
function updateLbl(){var t="";if(curView==="day"||curView==="tl")t=fmtLabel(curDay);else if(curView==="week")t=fmtWeekLabel(curWeekStart);else t=fmtMonthLabel(curMonth);document.getElementById("date-lbl").textContent=t;}
function render(){renderLockBtn();renderSummary();if(curView==="day")renderDay();else if(curView==="tl")renderTL();else if(curView==="week")renderWeek();else if(curView==="month")renderMonth();}

function renderLockBtn(){
  var ds=fmtD(curView==="day"||curView==="tl"?curDay:new Date());
  var btn=document.getElementById("btn-lock");
  if(isDayLocked(ds)){btn.textContent="🔒 ロック中";btn.style.background="#b05050";btn.style.color="#fff";}
  else{btn.textContent="🔓 ロック";btn.style.background="";btn.style.color="";}
}

function renderSummary(){
  var ds=fmtD(curView==="day"||curView==="tl"?curDay:new Date());
  var html="";
  for(var gi=0;gi<GROUPS.length;gi++){
    var g=GROUPS[gi];
    var maxPax=0;
    for(var ti=0;ti<g.tables.length;ti++) maxPax+=tableById(g.tables[ti]).cap;
    var used=0;
    var ex=rsvsByDate(ds).filter(function(r){return normalizeGroup(r.seat)===g.id && r.type==="normal";});
    for(var j=0;j<ex.length;j++){
      if(ex[j].table){
        var tbls=ex[j].table.split(",");
        for(var tk=0;tk<tbls.length;tk++){
          var tb=tableById(tbls[tk].trim());
          if(tb) used+=tb.cap;
        }
      } else {
        used+=parseInt(ex[j].pax)||0;
      }
    }
    var pct=Math.min(100,Math.round(used/maxPax*100));
    var bc=pct>=100?"#b05050":pct>=75?"#c8903a":g.color;
    html+="<div class='sc'><div class='sc-name'>"+g.name+"</div>"
      +"<div class='sc-bar-wrap'><div class='sc-bar' style='width:"+pct+"%;background:"+bc+"'></div></div>"
      +"<div class='sc-nums'><span class='sc-u'>"+used+"</span><span class='sc-sep'>/</span><span class='sc-tot'>"+maxPax+"名</span></div></div>";
  }
  document.getElementById("summary").innerHTML=html;
}

function rsvRowHtml(r){
  var isCharter=r.type==="charter";
  var grp=normalizeGroup(r.seat);
  var color=isCharter?"#c8903a":groupColor(grp);
  var name=isCharter?"【貸切】":(r.name+" 様");
  var tableInfo=isCharter?"全席":(groupName(grp)+(r.table?" "+r.table:" (未割当)"));
  var paxInfo=isCharter?"":r.pax+"名";
  var noteInfo=r.note?"<div style='font-size:10px;color:#999;width:100%;margin-top:2px'>備考: "+r.note+"</div>":"";
  return "<div class='card'><div class='dot' style='background:"+color+"'></div>"
    +"<span class='c-time'>"+r.time+"〜"+getEnd(r)+"</span>"
    +"<span class='c-name'>"+name+"</span>"
    +"<span class='c-seat'>"+tableInfo+"</span>"
    +"<span class='c-pax'>"+paxInfo+"</span>"
    +"<span class='c-tel'>"+(r.tel||"")+"</span>"
    +(isCharter?"":"<button class='edit-btn' data-edit='"+r.id+"'>編集</button>")
    +"<button class='del-btn' data-del='"+r.id+"'>削除</button>"
    +noteInfo+"</div>";
}

function renderDay(){
  var ds=fmtD(curDay);var day=rsvsByDate(ds).filter(function(r){return r.type!=="lock";});
  day.sort(function(a,b){return a.time<b.time?-1:1;});
  var c=document.getElementById("day-list");
  if(!day.length){c.innerHTML="<div class='empty'>この日の予約はありません</div>";return;}
  var g={};for(var i=0;i<day.length;i++){if(!g[day[i].time])g[day[i].time]=[];g[day[i].time].push(day[i]);}
  var times=Object.keys(g).sort();var html="";
  for(var t=0;t<times.length;t++){
    var time=times[t];var items=g[time];
    html+="<div class='grp'><div class='grp-head'>"+time+" <span class='grp-cnt'>"+items.length+"件</span></div>";
    for(var k=0;k<items.length;k++) html+=rsvRowHtml(items[k]);
    html+="</div>";
  }
  c.innerHTML=html;
}

function renderTL(){
  var ds=fmtD(curDay);var day=rsvsByDate(ds);var html="";
  html="<thead><tr><th style='min-width:70px;text-align:left;padding-left:4px'>卓</th>";
  for(var i=0;i<HOURS.length;i++) html+="<th>"+HOURS[i]+"</th>";
  html+="</tr></thead><tbody>";
  // 貸切行（その日に貸切があれば最上部）
  var charters=day.filter(function(r){return r.type==="charter";});
  for(var ci=0;ci<charters.length;ci++){
    var ch=charters[ci];
    html+="<tr><td class='tl-lbl' style='color:#c8903a'>貸切<div class='tl-lbl-sub'>"+(ch.note||"")+"</div></td>";
    var chStart=timeToMin(ch.time), chEnd=timeToMin(getEnd(ch));
    for(var hi=0;hi<HOURS.length;hi++){
      var s=timeToMin(HOURS[hi]), e=s+30;
      var on=overlaps(s,e,chStart,chEnd);
      html+="<td class='tl-cell' style='"+(on?"background:#faf0dd;":"")+"'>";
      if(on && s===chStart) html+="<div class='tl-block' style='background:#c8903a'><div class='tl-bname'>貸切</div></div>";
      html+="</td>";
    }
    html+="</tr>";
  }
  // 卓ごとの行
  for(var oi=0;oi<TL_ORDER.length;oi++){
    var tbl=tableById(TL_ORDER[oi]);
    html+="<tr><td class='tl-lbl'>"+tbl.id+"<div class='tl-lbl-sub'>"+tbl.cap+"名</div></td>";
    for(var hi=0;hi<HOURS.length;hi++){
      var slotStart=timeToMin(HOURS[hi]), slotEnd=slotStart+30;
      var blocks=[];
      for(var di=0;di<day.length;di++){
        var r=day[di];
        if(r.type==="lock"||r.type==="charter") continue;
        if(!r.table) continue;
        var tbls=r.table.split(",");
        var inTbl=false;
        for(var tk=0;tk<tbls.length;tk++){ if(tbls[tk].trim()===tbl.id) inTbl=true; }
        if(!inTbl) continue;
        if(overlaps(slotStart,slotEnd,timeToMin(r.time),timeToMin(getEnd(r)))) blocks.push(r);
      }
      var hasBlock=blocks.length>0;
      var bg=hasBlock?"background:"+hexToLight(tbl.color)+";":"";
      html+="<td class='tl-cell' style='"+bg+"'>";
      for(var bi=0;bi<blocks.length;bi++){
        var b=blocks[bi];
        if(timeToMin(b.time)!==slotStart) continue;
        html+="<div class='tl-block' style='background:"+tbl.color+"' data-edit='"+b.id+"'>"
          +"<div class='tl-bname'>"+b.name+"</div><div class='tl-bpax'>"+b.pax+"名</div></div>";
      }
      html+="</td>";
    }
    html+="</tr>";
  }
  html+="</tbody>";document.getElementById("tl-table").innerHTML=html;
}

function hexToLight(hex){
  var h=hex.replace("#","");
  var r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
  r=Math.round(r+(255-r)*0.85);g=Math.round(g+(255-g)*0.85);b=Math.round(b+(255-b)*0.85);
  return "rgb("+r+","+g+","+b+")";
}

function renderWeek(){
  var html="";
  for(var i=0;i<7;i++){
    var d=addDays(curWeekStart,i);var ds=fmtD(d);
    var list=rsvsByDate(ds).filter(function(r){return r.type!=="lock";});
    list.sort(function(a,b){return a.time<b.time?-1:1;});
    var locked=isDayLocked(ds);
    html+="<div class='week-col'><div class='week-col-head'><div class='week-col-dayname'>"+WEEK_NAMES[d.getDay()]+"</div><div class='week-col-num"+(isToday(d)?" is-today":"")+"'>"+d.getDate()+(locked?" 🔒":"")+"</div></div><div class='week-col-body'>";
    if(!list.length){html+="<div class='week-none'>-</div>";}
    else{
      var show=list.slice(0,4);
      for(var j=0;j<show.length;j++){
        var col=show[j].type==="charter"?"#c8903a":groupColor(normalizeGroup(show[j].seat));
        var nm=show[j].type==="charter"?"貸切":show[j].name;
        html+="<div class='week-chip' style='background:"+col+"'>"+show[j].time+" "+nm+"</div>";
      }
      if(list.length>4) html+="<div class='week-more'>+他"+(list.length-4)+"件</div>";
    }
    html+="</div></div>";
  }
  document.getElementById("week-grid").innerHTML=html;
}

function renderMonth(){
  var first=new Date(curMonth.getFullYear(),curMonth.getMonth(),1);
  var last=new Date(curMonth.getFullYear(),curMonth.getMonth()+1,0);
  var offset=first.getDay();var html="";
  for(var i=0;i<offset;i++) html+="<div class='month-cell other'></div>";
  for(var d=1;d<=last.getDate();d++){
    var date=new Date(curMonth.getFullYear(),curMonth.getMonth(),d);
    var ds=fmtD(date);var list=rsvsByDate(ds).filter(function(r){return r.type!=="lock";});
    list.sort(function(a,b){return a.time<b.time?-1:1;});
    var locked=isDayLocked(ds);
    var cls="month-cell"+(isToday(date)?" is-today":"")+(selMonthDay===ds?" selected":"");
    html+="<div class='"+cls+"' data-ds='"+ds+"'><div class='month-cell-num'>"+d+(locked?" 🔒":"")+"</div>";
    var show=list.slice(0,2);
    for(var j=0;j<show.length;j++){
      var col=show[j].type==="charter"?"#c8903a":groupColor(normalizeGroup(show[j].seat));
      var nm=show[j].type==="charter"?"貸切":show[j].name;
      html+="<div class='month-chip' style='background:"+col+"'>"+show[j].time+" "+nm+"</div>";
    }
    if(list.length>2) html+="<div class='month-more'>+他"+(list.length-2)+"件</div>";
    html+="</div>";
  }
  var rem=(7-((offset+last.getDate())%7))%7;
  for(var j=0;j<rem;j++) html+="<div class='month-cell other'></div>";
  document.getElementById("month-grid").innerHTML=html;
  if(selMonthDay) renderMonthDetail(selMonthDay);
}

  for(var i=0;i<list.length;i++) html+=rsvRowHtml(list[i]);
  panel.innerHTML=html;
}

  var sel=document.getElementById("m-endtime");

// 卓選択肢を更新（自動割当結果＋手動変更用）
function refreshTableOptions(autoTables){
  var grp=document.getElementById("m-seat").value;
  var g=groupById(grp);
  var sel=document.getElementById("m-table");
  sel.innerHTML="";
  // 自動割当
  var optAuto=document.createElement("option");
  optAuto.value=autoTables||"";
  optAuto.textContent="自動割当"+(autoTables?"（"+autoTables+"）":"（空きなし）");
  sel.appendChild(optAuto);
  // 各卓を個別選択肢に（グループ内）
  if(g){
    for(var i=0;i<g.tables.length;i++){
      var tbl=tableById(g.tables[i]);
      var o=document.createElement("option");
      o.value=tbl.id;
      o.textContent=tbl.id+"（"+tbl.cap+"名）";
      sel.appendChild(o);
    }
  }
}

function onModalChange(){
  var date=document.getElementById("m-date").value;
  var time=document.getElementById("m-time").value;
  var endtime=document.getElementById("m-endtime").value;
  var grp=document.getElementById("m-seat").value;
  var pax=parseInt(document.getElementById("m-pax").value)||1;
  var warn=document.getElementById("mwarn");var ok=document.getElementById("mok");
  if(!date||!time||!endtime) return;
  if(timeToMin(endtime)<=timeToMin(time)){warn.style.display="block";warn.textContent="終了時刻は開始時刻より後にしてください";ok.disabled=true;return;}
  var res=tryBook(date,time,endtime,grp,pax,editingId);
  if(!res.ok){
    warn.style.display="block";warn.textContent=res.reason;
    refreshTableOptions("");
    ok.disabled=true;
  } else {
    warn.style.display="none";
    refreshTableOptions(res.table);
    ok.disabled=false;
  }
}

function openModal(id){
  editingId=id;
  document.getElementById("modal-title").textContent=id?"予約を編集":"予約追加";
  if(id){
    var r=null;
    for(var i=0;i<rsvCache.length;i++) if(String(rsvCache[i].id)===String(id)) r=rsvCache[i];
    if(!r) return;
    document.getElementById("m-date").value=r.date;
    document.getElementById("m-time").value=r.time;
    document.getElementById("m-endtime").value=getEnd(r);
    document.getElementById("m-seat").value=normalizeGroup(r.seat);
    document.getElementById("m-pax").value=r.pax;
    document.getElementById("m-name").value=r.name;
    document.getElementById("m-tel").value=r.tel;
    document.getElementById("m-note").value=r.note||"";
    onModalChange();
    // 既存の卓があればそれを選択
    if(r.table){
      var sel=document.getElementById("m-table");
      var found=false;
      for(var i=0;i<sel.options.length;i++){ if(sel.options[i].value===r.table){sel.value=r.table;found=true;break;} }
      if(!found){ var o=document.createElement("option");o.value=r.table;o.textContent="現在: "+r.table;sel.insertBefore(o,sel.firstChild);sel.value=r.table; }
    }
  } else {
    var dd=(curView==="month"&&selMonthDay)?selMonthDay:fmtD(curDay);
    document.getElementById("m-date").value=dd;
    document.getElementById("m-time").value="18:00";
    autoEndtime();
    document.getElementById("m-seat").value="counter";
    document.getElementById("m-pax").value="2";
    document.getElementById("m-name").value="";
    document.getElementById("m-tel").value="";
    document.getElementById("m-note").value="";
    onModalChange();
  }
  document.getElementById("mwarn").style.display="none";
  document.getElementById("mok").disabled=false;
  document.getElementById("modal").classList.remove("off");
}
function closeModal(){document.getElementById("modal").classList.add("off");editingId=null;}

function saveRsv(){
  var date=document.getElementById("m-date").value;
  var time=document.getElementById("m-time").value;
  var endtime=document.getElementById("m-endtime").value;
  var grp=document.getElementById("m-seat").value;
  var pax=parseInt(document.getElementById("m-pax").value);
  var name=document.getElementById("m-name").value.trim();
  var tel=document.getElementById("m-tel").value.trim();
  var note=document.getElementById("m-note").value.trim();
  var table=document.getElementById("m-table").value;
  if(!date||!name){alert("日付とお名前を入力してください");return;}
  if(!table){
    var res=tryBook(date,time,endtime,grp,pax,editingId);
    if(!res.ok){alert(res.reason+"のため保存できません");return;}
    table=res.table;
  }
  var ok=document.getElementById("mok");ok.disabled=true;
  var payload={date:date,time:time,endtime:endtime,seat:grp,table:table,pax:pax,name:name,tel:tel,note:note,type:"normal"};
  if(editingId){payload.action="update";payload.id=editingId;}
  else{payload.action="add";}
  apiPost(payload);
  closeModal();ok.disabled=false;
  curDay=new Date(date+"T00:00:00");curWeekStart=weekStart(curDay);
  curMonth=new Date(curDay.getFullYear(),curDay.getMonth(),1);selMonthDay=date;
  updateLbl();
}

function openCharter(){
  var dd=(curView==="month"&&selMonthDay)?selMonthDay:fmtD(curDay);
  document.getElementById("ch-date").value=dd;
  document.getElementById("ch-start").value="18:00";
  document.getElementById("ch-end").value="22:00";
  document.getElementById("ch-note").value="";
  document.getElementById("charter-modal").classList.remove("off");
}
function closeCharter(){document.getElementById("charter-modal").classList.add("off");}
function saveCharter(){
  var date=document.getElementById("ch-date").value;
  var start=document.getElementById("ch-start").value;
  var end=document.getElementById("ch-end").value;
  var note=document.getElementById("ch-note").value.trim();
  if(!date){alert("日付を入力してください");return;}
  if(timeToMin(end)<=timeToMin(start)){alert("終了時刻は開始時刻より後にしてください");return;}
  if(!confirm(date+" "+start+"〜"+end+" を貸切にしますか？")) return;
  apiPost({action:"add",date:date,time:start,endtime:end,seat:"charter",table:"",pax:0,name:"貸切",tel:"",note:note,type:"charter"});
  closeCharter();
  curDay=new Date(date+"T00:00:00");curWeekStart=weekStart(curDay);
  curMonth=new Date(curDay.getFullYear(),curDay.getMonth(),1);selMonthDay=date;
  updateLbl();
}

function toggleLock(){
  var ds=fmtD(curView==="day"||curView==="tl"?curDay:new Date());
  if(isDayLocked(ds)){
    var lockId=null;
    for(var i=0;i<rsvCache.length;i++){ if(rsvCache[i].date===ds&&rsvCache[i].type==="lock") lockId=rsvCache[i].id; }
    if(lockId&&confirm(fmtLabel(curDay)+"のロックを解除しますか？")){ apiPost({action:"delete",id:lockId}); }
  } else {
    if(confirm(fmtLabel(curDay)+"を満席（ロック）にしますか？")){
      apiPost({action:"add",date:ds,time:"",endtime:"",seat:"",table:"",pax:0,name:"",tel:"",note:"手動ロック",type:"lock"});
    }
  }
}

setView("day");loadRsvs();setInterval(loadRsvs,10000);
})();

</script>
